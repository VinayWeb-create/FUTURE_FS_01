<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You — Vinay Avala</title>

  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --primary: #FF6B35;
      --secondary: #F7931E;
      --accent: #00D9FF;
      --dark: #0A0E27;
      --darker: #050814;
      --text: #E8E8F0;
      --muted: #9BA4B5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--darker);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: 
        radial-gradient(circle at 30% 40%, rgba(255, 107, 53, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(0, 217, 255, 0.2) 0%, transparent 50%),
        var(--darker);
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .particle {
      position: absolute;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.3;
      animation: float 6s ease-in-out infinite;
    }

    .particle:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .particle:nth-child(2) {
      width: 60px;
      height: 60px;
      top: 70%;
      right: 20%;
      background: var(--primary);
      animation-delay: 2s;
    }

    .particle:nth-child(3) {
      width: 100px;
      height: 100px;
      bottom: 15%;
      left: 25%;
      background: var(--secondary);
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-30px) rotate(180deg);
      }
    }

    /* Success Card */
    .success-card {
      max-width: 600px;
      width: 100%;
      background: linear-gradient(145deg, rgba(255, 107, 53, 0.1), rgba(0, 217, 255, 0.1));
      border: 1px solid rgba(255, 107, 53, 0.3);
      border-radius: 30px;
      padding: 4rem 3rem;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }

    .success-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 107, 53, 0.1), transparent);
      animation: shine 3s ease-in-out infinite;
    }

    @keyframes shine {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .success-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: white;
      box-shadow: 0 20px 40px rgba(255, 107, 53, 0.4);
      animation: pulse 2s ease infinite;
      position: relative;
      z-index: 1;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 20px 40px rgba(255, 107, 53, 0.4);
      }
      50% {
        transform: scale(1.1);
        box-shadow: 0 25px 50px rgba(255, 107, 53, 0.6);
      }
    }

    .success-title {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }

    .success-message {
      font-size: 1.2rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .highlight {
      color: var(--accent);
      font-weight: 700;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2.5rem;
      position: relative;
      z-index: 1;
    }

    .btn {
      padding: 1rem 2.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(255, 107, 53, 0.5);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
    }

    .btn-secondary:hover {
      background: var(--accent);
      color: var(--dark);
      transform: translateY(-3px);
    }

    /* Confetti Animation */
    @keyframes confetti {
      0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--primary);
      animation: confetti 3s ease-in-out infinite;
    }

    @media (max-width: 576px) {
      .success-card {
        padding: 3rem 2rem;
      }

      .success-title {
        font-size: 2rem;
      }

      .success-message {
        font-size: 1rem;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="bg-animation"></div>
  
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="success-card">
    <div class="success-icon">
      <i class="fas fa-check"></i>
    </div>

    <h1 class="success-title">Message Sent!</h1>

    <p class="success-message">
      Thank you for reaching out! I've received your message and will get back to you 
      within <span class="highlight">24 hours</span>. Looking forward to connecting with you!
    </p>

    <div class="button-group">
      <a href="index.html" class="btn btn-primary">
        <i class="fas fa-home"></i>
        Back to Home
      </a>
      <a href="projects.html" class="btn btn-secondary">
        <i class="fas fa-briefcase"></i>
        View Projects
      </a>
    </div>
  </div>

  <script>
    // Create confetti effect
    function createConfetti() {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.background = ['#FF6B35', '#F7931E', '#00D9FF'][Math.floor(Math.random() * 3)];
      confetti.style.animationDelay = Math.random() * 3 + 's';
      confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(confetti);

      setTimeout(() => {
        confetti.remove();
      }, 5000);
    }

    // Generate confetti on load
    for (let i = 0; i < 50; i++) {
      setTimeout(createConfetti, i * 100);
    }
  </script>
</body>
</html>
